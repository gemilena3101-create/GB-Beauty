<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB Beauty</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#fff5f8;
color:#333;
}

header{
background:#ff6fa9;
padding:20px;
text-align:center;
color:white;
}

header h1{
font-size:40px;
}

header p{
margin-top:10px;
}

.banner{
padding:70px 20px;
text-align:center;
}

.banner h2{
font-size:38px;
color:#ff4f92;
margin-bottom:15px;
}

.banner p{
font-size:18px;
margin-bottom:30px;
}

.botao{
display:inline-block;
padding:15px 35px;
background:#ff4f92;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:bold;
transition:.3s;
}

.botao:hover{
background:#e43d7f;
}

.produtos{
padding:50px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{

background:white;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.08);
overflow:hidden;
text-align:center;
padding-bottom:20px;

}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
margin:15px 0 10px;
}

.preco{
font-size:24px;
font-weight:bold;
color:#ff4f92;
margin-bottom:15px;
}

.card button{

background:#ff4f92;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
font-size:16px;

}

footer{

background:#ff6fa9;
color:white;
padding:25px;
text-align:center;
margin-top:50px;

}

</style>

</head>

<body>

<header>

<h1>GB Beauty</h1>

<p>Sua beleza, seu brilho ✨</p>

</header>

<section class="banner">

<h2>Bem-vinda à GB Beauty</h2>

<p>Maquiagens, Body Splash e acessórios com entrega rápida.</p>

<a class="botao" href="https://wa.me/5500000000000">

Falar no WhatsApp

</a>

</section>

<section class="produtos">

<div class="card">

<img src="https://via.placeholder.com/400x400?text=Gloss">

<h3>Gloss</h3>

<div class="preco">R$ 15,00</div>

<button>Comprar</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/400x400?text=Body+Splash">

<h3>Body Splash</h3>

<div class="preco">R$ 35,00</div>

<button>Comprar</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/400x400?text=Acessorio">

<h3>Acessório</h3>

<div class="preco">R$ 19,90</div>

<button>Comprar</button>

</div>

</section>

<footer>

GB Beauty © 2026

</footer>

</body>
</html>
